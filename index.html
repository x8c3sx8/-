function startQuiz(level) {
    const questions = masterQuizData[level].sort(() => 0.5 - Math.random()).slice(0, 15);
    document.getElementById('menu').style.display = 'none';
    document.getElementById('quiz-area').style.display = 'block';
    
    let html = `<h2>${level.toUpperCase()}コース</h2>`;
    questions.forEach((q, i) => {
        html += `<div class="quiz-item">
            <p><strong>Q${i+1}: ${q.q}</strong></p>
            ${q.opt.map((o, oi) => `<button class="option-btn" onclick="showExp(${i}, ${oi}, ${q.ans})">${o}</button>`).join('')}
            <div id="exp${i}" class="exp"><strong>解説:</strong> ${q.exp}</div>
        </div>`;
    });
    document.getElementById('quiz-content').innerHTML = html;
}

function showExp(qIdx, choice, ans) {
    const expDiv = document.getElementById('exp' + qIdx);
    expDiv.style.display = 'block';
    // 正解・不正解の視覚フィードバック
    if(choice === ans) expDiv.style.borderColor = "#48bb78";
    else expDiv.style.borderColor = "#e53e3e";
}
